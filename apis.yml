apis:
  - aid: soundstripe:api
    name: Soundstripe API
    description: >-
      Server-to-server REST API for embedding the Soundstripe catalog into
      creator tools, editing suites, and platforms. JSON:API responses, token
      authentication via the Authorization header, and 25 requests per second.
      Endpoints cover song retrieval, sound-effect listing, categories,
      curated playlists, private (user-scoped) playlist management, and the
      Supe AI search workflow (asset upload, natural-language search, signed
      webhook delivery of matched songs with audio files and artists).
    humanURL: https://docs.soundstripe.com
    baseURL: https://api.soundstripe.com
