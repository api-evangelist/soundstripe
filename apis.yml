name: Soundstripe
kind: company
description: >-
  Soundstripe is a Nashville-based subscription platform that licenses
  royalty-free music, sound effects, and stock video to creators, agencies,
  podcasters, filmmakers, and enterprises. The catalog spans roughly
  120,000 human-made tracks from Grammy-winning and independent artists,
  nearly 100,000 sound effects, and 100,000+ stock video clips (HD through
  8K) — all pre-cleared under a single digital license that covers YouTube,
  Instagram, TikTok, podcasting, and commercial use, with stems and
  cut-downs available for many songs. Soundstripe also publishes a
  server-to-server REST API at api.soundstripe.com (JSON:API, token auth,
  25 req/sec, signed webhooks) that exposes songs, sound effects,
  playlists, private playlists, and "Supe" — an AI music supervisor that
  matches catalog tracks to natural-language briefs, scene context, and
  reference imagery via asynchronous search and asset upload endpoints.
  Native integrations exist for Adobe Premiere Pro, Adobe Express, and
  Twitch; partner programs cover API embedding, music resale, and custom
  licensing for tool makers and platforms.
